name: Pull Request

# "This run was triggered by the "push" event, which is unsupported.
#  Please ensure you are using the "pull_request" event for this workflow."
on:
  pull_request:

  # SRC: https://github.com/amannn/action-semantic-pull-request?tab=readme-ov-file#installation
  # pull_request_target:
  #   types:
  #     - opened
  #     - reopened
  #     - edited
  #     # - synchronize (if you use required Actions)

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pull-request:
    uses: ./.github/workflows/semantic-pull-request.yml

  audit:
    uses: ./.github/workflows/dependency-review.yml
