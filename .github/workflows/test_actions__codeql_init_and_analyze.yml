name: Test actions/codeql_init_and_analyze

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  default:
    runs-on: ubuntu-latest
    name: CodeQL init & analyze
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/codeql_init_and_analyze
        with:
          language: actions

  matrix__config-file:
    needs: default
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config-file: node.yml
            continue-on-error: false

          - config-file: hello-world-javascript-action.yml
            continue-on-error: false

          # Fails: "[ERROR] Spawned process exited abnormally"
          - config-file: ignore-everything.yml
            continue-on-error: true

    name: "config-file: ${{ matrix.config-file }}"
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/codeql_init_and_analyze
        continue-on-error: ${{ matrix.continue-on-error }}
        with:
          language: actions
          config-file: assets/codeql/config/${{ matrix.config-file }}

  matrix__language:
    needs: default
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript

    name: CodeQL init & analyze
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/codeql_init_and_analyze
        with:
          language: ${{ matrix.language }}
          # config-file: ./.github/codeql/codeql-config.yml # default
