name: Test actions/codeql_init_and_analyze

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  default:
    runs-on: ubuntu-latest

    name: CodeQL init and analyze
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/codeql_init_and_analyze
        with:
          language: actions

  matrix__config-file:
    runs-on: ubuntu-latest
    needs: default
    strategy:
      matrix:
        config-file:
          # - .github/codeql/codeql-config.yml
          - assets/codeql/config/ignore-everything.yml
          - assets/codeql/config/ignore-node.yml

    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/codeql_init_and_analyze
        with:
          language: actions
          config-file: ${{ matrix.config-file }}
