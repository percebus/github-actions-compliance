name: Test workflows/codeql_analyze

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  default:
    name: CodeQL analyze
    uses: ./.github/workflows/codeql_analyze.yml
    with:
      language: actions

  #
  matrix__config-file:
    needs: default
    strategy:
      fail-fast: false
      matrix:
        config-file:
          - ./.github/codeql/codeql-config.yml

          # Tested in "Test actions/codeql_init_and_analyze"
          # - assets/codeql/config/ignore-everything.yml
          # - assets/codeql/config/node.yml
          # - assets/codeql/config/hello-world-javascript-action.yml

    name: "config-file: ${{ matrix.config-file }}"
    uses: ./.github/workflows/codeql_analyze.yml
    with:
      language: actions
      config-file: ${{ matrix.config-file }}

  language_javascript__prepare:
    needs: default
    runs-on: ubuntu-latest
    name: "Prepare language:javascript"
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      - name: dist
        run: mv assets/languages/javascript/ dist

      - uses: percebus/github-actions-common/.github/actions/artifact-upload@main
        with:
          name: dist_js
          path: dist

  language:
    needs: language_javascript__prepare
    uses: ./.github/workflows/codeql_analyze.yml
    name: CodeQL analyze
    with:
      language: javascript
      config-file: ./.github/codeql/codeql-config.yml
      download-artifact_name: dist_js
      download-artifact_path: dist
