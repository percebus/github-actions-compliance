name: Test workflows/codeql_analyze

on:
  push:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  test__matrix:
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          # - javascript # No JavaScript detected

    name: CodeQL analyze
    uses: ./.github/workflows/codeql_analyze.yml
    with:
      language: ${{ matrix.language }}
