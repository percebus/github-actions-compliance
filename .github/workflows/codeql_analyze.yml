name: codeql analyze

on:
  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows
    inputs:
      language:
        type: string
        description: The programming language to analyze
        required: true

      config-file:
        type: string
        description: The path to the CodeQL configuration file
        required: false
        # default: "./.github/codeql/codeql-config.yml" # TODO
        default: "" # XXX when all jobs have been migrated

      build-mode:
        type: string
        description: The build mode that will be used to analyze the language. This input is only available when analyzing a single CodeQL language per job, for example using a matrix.
        required: false
        default: "none"

      download-artifact_name:
        type: string
        description: The name of the artifact to download
        required: false
        default: ""

      download-artifact_path:
        type: string
        description: The path of the artifact to download
        required: false
        default: "dist"

    secrets:
      SSH_KEY_PRIVATE:
        description: SSH private key
        required: false

  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      language:
        type: string
        description: The programming language to analyze
        required: true

      config-file:
        type: string
        description: The path to the CodeQL configuration file
        required: false
        default: "./.github/codeql/codeql-config.yml"

      build-mode:
        type: string
        description: The build mode that will be used to analyze the language. This input is only available when analyzing a single CodeQL language per job, for example using a matrix.
        required: false
        default: "none"

      download-artifact_name:
        type: string
        description: The name of the artifact to download
        required: false
        default: ""

      download-artifact_path:
        type: string
        description: The path of the artifact to download
        required: false
        default: "dist"

# NOTE: This workflow requires the following permissions
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql_analyze:
    runs-on: ubuntu-latest
    name: ${{ inputs.language }}
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE }}

      - name: ${{ inputs.download-artifact_name }}.zip
        if: ${{ inputs.download-artifact_name }}
        uses: percebus/github-actions-common/.github/actions/artifact-download@main
        with:
          name: ${{ inputs.download-artifact_name }}
          path: ${{ inputs.download-artifact_path }}

      - uses: percebus/github-actions-compliance/.github/actions/codeql_init_and_analyze@main
        with:
          language: ${{ inputs.language }}
          build-mode: ${{ inputs.build-mode }}
          config-file: ${{ inputs.config-file }}
