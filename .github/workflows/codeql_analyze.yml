name: codeql analyze

on:
  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows
    inputs:
      language:
        type: string
        description: The programming language to analyze
        required: true

    secrets:
      ssh-private-key:
        description: SSH private key
        required: false

    config-file:
      description: The path to the CodeQL configuration file
      required: false
      # default: "./.github/codeql/codeql-config.yml" # TODO
      default: "" # XXX when all jobs have been migrated

  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      language:
        type: string
        description: The programming language to analyze
        required: true

      config-file:
        type: string
        description: The path to the CodeQL configuration file
        required: false
        default: "./.github/codeql/codeql-config.yml"

# NOTE: This workflow requires the following permissions
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql_analyze:
    runs-on: ubuntu-latest
    name: ${{ inputs.language }}
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}

      - uses: percebus/github-actions-compliance/.github/actions/codeql_init_and_analyze@main
        with:
          language: ${{ inputs.language }}
